<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - تطبيق رفيق</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo" style="text-decoration: none;">
    <img src="images/rafeeq_logo.png" alt="شعار تطبيق رفيق">
    <div>
        <h2>رفيق</h2>
        <p>وقت آمن ومفيد</p>
    </div>
</a>
    </header>

    <div class="hero">
        <div class="hero-card">
            <h1 id="pageTitle">تسجيل الدخول</h1>
            
            <form id="loginForm">
                <div class="input-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="email" placeholder="example@email.com" required>
                </div>
                
                <div class="input-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="password" placeholder="********" required>
                </div>

                <div class="loader" id="loadingSpinner" style="display:none;"></div>
                <p class="message" id="message"></p>

                <button type="submit" class="btn green full-btn">دخول</button>
            </form>

            <button type="button" id="googleLoginBtn" class="btn" style="background: #db4437; width: 100%; margin-top: 15px; border: none; cursor: pointer;">
                دخول باستخدام Google
            </button>

            <hr class="divider">
            <p class="register-text">ليس لديك حساب؟</p>
            <a href="register.html" id="registerLink" class="btn blue full-btn">إنشاء حساب جديد</a>
        </div>
    </div>

    <script type="module">
        import { loginUser, loginWithGoogle } from './js/auth.js';
        
        // جلب الدور من الرابط (parent أو mentor)
        const urlParams = new URLSearchParams(window.location.search);
        const role = urlParams.get('role') || 'parent'; 
        
        const title = document.getElementById("pageTitle");
        const registerLink = document.getElementById("registerLink");
        
        if(role === "parent"){
            title.innerHTML = "دخول أولياء الأمور";
            registerLink.href = `register.html?role=${role}`;
        } else if(role === "mentor"){
            title.innerHTML = "دخول المرشدات";
            registerLink.href = `register.html?role=${role}`;
        }

        // معالجة الدخول التقليدي
        document.getElementById("loginForm").addEventListener("submit", function(e){
            e.preventDefault();
            loginUser(role);
        });

        // معالجة الدخول بجوجل
        document.getElementById("googleLoginBtn").addEventListener("click", function(){
            loginWithGoogle(role);
        });
    </script>
</body>
</html>
