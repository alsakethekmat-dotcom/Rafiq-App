<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة ولي الأمر - تطبيق رفيق</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .dashboard-container {
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }
        .action-cards {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        .action-cards a { flex: 1; text-align: center; text-decoration: none; }
        
        .section-title {
            color: #16376b;
            border-bottom: 2px solid #eef2f7;
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 22px;
        }
        .request-item {
            background: white;
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .req-info h4 { color: #16376b; margin-bottom: 5px; font-size: 18px;}
        .req-info p { color: #666; font-size: 15px; margin-bottom: 3px;}
        .req-status { text-align: left; }
        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .badge.pending { background: #fff3cd; color: #856404; }
        .badge.accepted { background: #d4edda; color: #155724; }
        .badge.rejected { background: #f8d7da; color: #721c24; }
        .badge.rated { background: #e2f0fd; color: #1a73e8; } /* تصميم مخصص لحالة تم التقييم */
        
        @media(max-width: 768px) {
            .action-cards { flex-direction: column; }
            .request-item { flex-direction: column; align-items: flex-start; gap: 15px; }
            .req-status { text-align: right; width: 100%; }
            .req-status .btn { width: 100%; }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo" style="text-decoration: none;">
            <img src="images/rafeeq_logo.png" alt="شعار تطبيق رفيق">
            <div>
                <h2>رفيق</h2>
                <p id="parentWelcome">أولياء الأمور</p> 
            </div>
        </a>
        <button id="logoutBtn" class="btn" style="background:#dc3545; padding: 10px 20px; font-size: 14px; border: none; cursor: pointer; color: white; font-weight: bold; border-radius: 8px;">تسجيل خروج</button>
    </header>

    <div class="hero" id="mainContent" style="align-items: flex-start; display: none;">
        <div class="dashboard-container">
            
            <div class="action-cards">
                <a href="mentors.html" class="btn green">👩 استعراض المرشدات المتاحات</a>
                <a href="request.html" class="btn blue">📝 طلب جلسة انتظار جديدة</a>
            </div>

            <div style="background: white; border-radius: 20px; padding: 30px; box-shadow: 0 5px 20px rgba(0,0,0,0.05);">
                <h3 class="section-title">طلباتي السابقة والحالية</h3>
                <div class="loader" id="loadingSpinner" style="display: block;"></div>
                <div id="myRequestsContainer"></div>
            </div>

        </div>
    </div>

    <div id="securePageLoader" class="loader" style="display: block; margin: 100px auto;"></div>

    <script type="module">
        import { db, auth } from './js/firebase.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
        import { doc, getDoc, collection, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        const container = document.getElementById('myRequestsContainer');
        const spinner = document.getElementById('loadingSpinner');
        const securePageLoader = document.getElementById('securePageLoader');
        const mainContent = document.getElementById('mainContent');

        // 🛡️ التطبيق الصارم لحماية المسار داخل لوحة ولي الأمر
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    // التحقق المزدوج: يجب وجود الحساب وأن يحمل صفة ولي الأمر حصراً
                    if (userDoc.exists() && userDoc.data().role === "parent") {
                        const welcomeElem = document.getElementById('parentWelcome');
                        if (welcomeElem) {
                            welcomeElem.innerText = `مرحباً ${userDoc.data().name}`;
                        }
                        
                        // إنهاء تحميل الأمان وعرض عناصر التحكم باللوحة
                        securePageLoader.style.display = "none";
                        mainContent.style.display = "flex";
                        
                        // بدء تشغيل جلب طلبات الأبناء النشطة
                        listenToMyRequests(user.uid);
                    } else {
                        // الحساب المسجل ليس ولي أمر (قد يكون مرشدة تحاول الدخول بطريق الخطأ)
                        window.location.href = "index.html";
                    }
                } catch (err) {
                    console.error("خطأ في التحقق البرمجي للأمان الإداري:", err);
                    window.location.href = "index.html";
                }
            } else {
                // زائر مجهول الهوية يحاول الوصول المباشر، يتم طرده لصفحة الدخول المخصصة لولي الأمر
                window.location.href = "login.html?role=parent";
            }
        });

        function listenToMyRequests(parentId) {
            const q = query(
                collection(db, "requests"), 
                where("parentId", "==", parentId), 
                orderBy("createdAt", "desc")
            );
            
            onSnapshot(q, (snapshot) => {
                if (snapshot) spinner.style.display = "none"; 
                container.innerHTML = "";

                if (snapshot.empty) {
                    container.innerHTML = `<p style="text-align: center; color: #888;">لم تقم بإرسال أي طلبات حتى الآن.</p>`;
                    return;
                }

                snapshot.forEach((docSnap) => {
                    const req = docSnap.data();
                    const requestId = docSnap.id; // 🔑 جلب المعرف الفريد للمستند لاستخدامه في رابط التقييم
                    
                    let badgeClass = "pending";
                    let displayStatus = req.status;

                    if(req.status === "مقبول") badgeClass = "accepted";
                    if(req.status === "مرفوض") badgeClass = "rejected";
                    if(req.status === "تم التقييم") {
                        badgeClass = "rated";
                        displayStatus = "تم التقييم";
                    }

                    // بناء ميكانيكية زر التقييم الذكي وتمرير الـ requestId
                    let rateBtn = "";
                    if(req.status === "مقبول") {
                        rateBtn = `<a href="rating.html?mentor=${encodeURIComponent(req.mentorName)}&requestId=${requestId}" class="btn" style="background:#ffc107; color:#000; padding:8px 15px; font-size:14px; margin-top:5px; display:inline-block; text-decoration:none; border-radius:8px; font-weight:bold;">⭐ تقييم المرشدة</a>`;
                    } else if(req.status === "تم التقييم") {
                        // زر رمادي معطل يشير إلى اكتمال عملية التقييم بنجاح
                        rateBtn = `<a href="#" class="btn" style="background:#e0e0e0; color:#757575; padding:8px 15px; font-size:14px; margin-top:5px; display:inline-block; text-decoration:none; border-radius:8px; font-weight:bold; pointer-events: none; cursor: default;">✓ تم التقييم</a>`;
                    }

                    container.innerHTML += `
                        <div class="request-item">
                            <div class="req-info">
                                <h4>الطالب/ة: ${req.studentName} (الصف ${req.grade})</h4>
                                <p><strong>المرشدة:</strong> ${req.mentorName}</p>
                                <p><strong>الخدمة:</strong> ${req.serviceType} | <strong>الوقت:</strong> ${req.waitTime}</p>
                            </div>
                            <div class="req-status">
                                <div class="badge ${badgeClass}">${displayStatus}</div>
                                <br>
                                ${rateBtn}
                            </div>
                        </div>
                    `;
                });
            }, (error) => {
                console.error("خطأ فايربيس في جلب الطلبات الحية:", error);
                if (spinner) spinner.style.display = "none";
                container.innerHTML = `<p style="text-align: center; color: #dc3545;">حدث خطأ أثناء تحميل الطلبات المستمرة.</p>`;
            });
        }

        // تحسين ميكانيكية عمل زر تسجيل الخروج مع التثبيت الآمن
        document.getElementById('logoutBtn').addEventListener('click', () => {
            if(confirm("هل أنت متأكد من رغبتك في تسجيل الخروج من حسابك؟")) {
                signOut(auth).then(() => {
                    window.location.href = "index.html";
                }).catch((error) => {
                    alert("فشل تسجيل الخروج، يرجى المحاولة لاحقاً.");
                });
            }
        });
    </script>
</body>
</html>
